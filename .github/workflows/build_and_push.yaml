name: Build and Push to ECR
run-name: Build and Push for ${{ github.ref }}
on:
  push:
    branches:
      - feature/obsrv-service
    tags:
      - "*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-api-service-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build docker image and push
        uses: docker/build-push-action@v5
        with:
          file: ./api-service/Dockerfile
          push: true
          tags: |
            522814700227.dkr.ecr.us-east-1.amazonaws.com/lms_sb_obsrv_api_service:api-service-${{ github.sha }}
            522814700227.dkr.ecr.us-east-1.amazonaws.com/lms_sb_obsrv_api_service:api-service-latest

  build-command-service-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build docker image and push
        uses: docker/build-push-action@v5
        with:
          context: ./command-service
          platforms: linux/amd64
          push: true
          tags: |
            522814700227.dkr.ecr.us-east-1.amazonaws.com/lms_sb_obsrv_api_service:command-service-${{ github.sha }}
            522814700227.dkr.ecr.us-east-1.amazonaws.com/lms_sb_obsrv_api_service:command-service-latest


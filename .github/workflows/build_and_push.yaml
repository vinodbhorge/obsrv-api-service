          git tag -a "${{ steps.image-tag.outputs.IMAGE_TAG }}" -m "Release ${{ steps.image-tag.outputs.IMAGE_TAG }}"
          git push origin "${{ steps.image-tag.outputs.IMAGE_TAG }}"

  build-system-rules-ingestor-image:
